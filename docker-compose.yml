services:
  postgres:
    image: postgres:16-alpine
    container_name: mrt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mrt_db}
      POSTGRES_USER: ${POSTGRES_USER:-mrt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mrt-network
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mrt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrt-backend
    restart: unless-stopped
    expose:
      - "9090"
    environment:
      - PORT=9090
      - DATABASE_URL=postgres://${POSTGRES_USER:-mrt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mrt_db}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - FONNTE_TOKEN=${FONNTE_TOKEN:-}
    networks:
      - mrt-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:9090/api/v1}
    container_name: mrt-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - mrt-network
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: mrt-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mrt-network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  mrt-network:
    driver: bridge
