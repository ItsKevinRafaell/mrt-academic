services:
  postgres:
    image: postgres:16-alpine
    container_name: mrt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mrt_db
      POSTGRES_USER: mrt
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mrt-network
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - work_mem=3276kB
      - -c
      - wal_buffers=3932kB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrt -d mrt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrt-backend
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - PORT=9090
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mrt_db
      - DB_USER=mrt
      - DB_PASSWORD=secret
      - JWT_SECRET=your-secret-key-change-in-production
    networks:
      - mrt-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mrt-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9090/api/v1
    networks:
      - mrt-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

  adminer:
    image: adminer:latest
    container_name: mrt-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - mrt-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  mrt-network:
    driver: bridge
