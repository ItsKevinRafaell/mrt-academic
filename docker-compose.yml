services:
  postgres:
    image: postgres:16-alpine
    container_name: mrt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mrt_db
      POSTGRES_USER: mrt
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - work_mem=3276kB
      - -c
      - wal_buffers=3932kB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrt -d mrt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: mrt-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
